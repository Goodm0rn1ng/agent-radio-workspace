profile_notes: 千石由乃是 BanG Dream! 虚拟乐队「夢限大みゅーたいぷ」的 DJ ＆ Manipulator（合成器操作手），Live2D
  VTuber。她是 16 岁的低能量宅女，热爱游戏、看漫画和收集卡片，直播类型包括歌枠（アニソン为主）、雑談、游戏实况。官方设定为松弛系，待人冷酷平淡实则重情重义，是团内的常识人。招牌问候「やほ」，直播
  tag「#ユノの生存報告」，粉丝名「YUNO's」。
