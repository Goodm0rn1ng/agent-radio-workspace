# ─────────────────────────────────────────────────────────────────────────────
# 节目处理方案 + 归档方案：峰月律 (Minetsuki Ritsu) / 夢限大みゅーたいぷ
# 用于 clipper Branch B（new）总结该 VTuber 的 YouTube 直播。
# 独立于现有 羊宮妃那 节目，不影响其配置。
# ─────────────────────────────────────────────────────────────────────────────
program_id: minetsuki_ritsu
display_name: 夢限大みゅーたいぷ 峰月律
performer: 峰月律（みねつき りつ / Minetsuki Ritsu）
band: 夢限大みゅーたいぷ（Mugendai Mewtype / Yumemita）
channel_url: https://www.youtube.com/@ritsu_yumemita
channel_id: UCxc0MrPoACKTFlV24GqX2sg
# 峰月律 应援色（用户指定）：字幕中文行用此色
accent_color: "#4477CC"

# ── 角色调研摘要（人设 / 直播风格）──────────────────────────────────────────
profile_notes: |
  峰月律是 BanG Dream! 虚拟乐队「夢限大みゅーたいぷ」的吉他/节奏吉他担当（VTuber，Live2D）。
  官方定位是认真、素直的优等生，冷静支撑乐队音乐；但也会做出超出大家预想的举动，
  食欲是成员中数一数二的「夢限大」。频道简介强调她喜欢吃、オカルトホラー和唱歌。
  她也有ポンコツ可爱、害羞、碎碎念、认真告知和突然高能的直播语气。
  成员色 PONKOTSU BLUE。生日 2/7，身高 157cm。招牌问候「やほ」。
  直播 tag #見守律，绘图 tag #りつみて，粉丝名「りっちゃんズ」，推しマ「🐻🎸」。
  直播类型以「歌枠（アニソン为主）」「雑談」「作業用BGM」「ゲーム」「企划/活动告知」为主。

# ═════════════════════════════════════════════════════════════════════════════
# 【节目处理方案】processing —— STT/翻译/总结/二次创作的口径
# ═════════════════════════════════════════════════════════════════════════════
processing:
  language: ja            # 源语言：日文
  translate_to: zh        # 译文：简体中文
  translation_prompt_path: minetsuki_ritsu_translate.txt
  stream_types: [歌枠(アニソン), 雑談, 作業用BGM, ゲーム]
  # 覆盖全局 STT prompt：只注入本节目人名/术语。
  # （全局 prompt 里的「安野希世乃、悠木碧」曾在歌枠音乐段被 Whisper 幻听成转写内容）
  stt_prompt: "VTuber、歌枠、配信、峰月律、りっちゃん、夢限大みゅーたいぷ、BanG Dream"

  # KG 主持人身份：驱动 radio_kg 实体抽取的第一人称(私/僕)与昵称归一，
  # 避免把本人发言错挂到默认主持人「羊宮妃那」。名字统一为「峰月律」。
  # 注：早前曾误记为「立石凛」/「峰乐律」，均纠正为「峰月律」。
  host:
    canonical: 峰月律
    type: Person
    aliases: [りつ, 律, 峰月, みねつき, りっちゃん, りっちゃ, Minetsuki Ritsu]

  # 节目专属总结提示词（覆盖全局声优广播口径，改用 VTuber 直播/歌枠 口径）
  summary_prompt_path: minetsuki_ritsu_summarize.txt
  # 总结参数（覆盖全局默认 max_summary_chars=600 / target_highlight_count=5）
  summary:
    max_summary_chars: 700
    target_highlight_count: 0      # 直播不推 highlight 消息，setlist 走 sections.music

  # 总结侧重（注入提示词 {summary_style} 槽；也喂给二次创作/标题/文案）
  summary_style: |
    以「ポンコツ可爱 + 多才创作者」的语气总结。重点抓取：
    1) 歌枠曲目 setlist（曲名/原作动画，日文原名优先）；
    2) 雑談话题与名场面（ポンコツ瞬间、与粉丝「見守り」互动）；
    3) 与乐队/同伴相关的提及；
    4) 招牌问候「やほ」与情绪节点。

  # 爆火因素侧重（clipper Branch B 判断片段潜力时参考）
  viral_focus: |
    歌枠翻唱的アニソン是否命中当前 B 站热门歌曲/热番；ポンコツ名场面；高能演唱段落。

  # 专名纠正：对 ja+zh 双语做 str.replace（修 ASR/翻译把生僻专名听/译错）。
  # 运行时并入 Radio settings.name_corrections，不改 Radio 配置文件。
