# ═════════════════════════════════════════════════════════════════════════════
# 【归档方案】archiving —— 落盘布局 / 入库口径
# ═════════════════════════════════════════════════════════════════════════════
archiving:
  collection_id: minetsuki_ritsu          # 归档到 RADIO_DATA_DIR/<collection_id>/
  recordings_root: ../Radio/data/recordings
  # 该集合直接复用现有 RADIO_DATA_DIR，故 radio_kg 检索/问答天然能消费。
  episode_dir_template: "{date}_{label}"  # 例：2026-05-19_【歌枠】アニソンおんりー歌枠
  # 无 #N 期号：episode_label 用「日期 + 直播标题」；broadcast_date 取 YouTube upload_date。
  kg_program_name: 夢限大みゅーたいぷ 峰月律
  auto_policy: confirm                     # 自动总结入库、无人工审查（in-graph 解决冲突/纠偏）
  keep_source_video: true                  # 保留源视频，供后续按时间戳切片
  auto_telegram: true                      # 上传/处理后自动推送 Telegram 切片菜单（点击即切片）
  products:                                # 每期产物
    - 03_ja_segments.json                  # 日文逐句（带时间戳）
    - 04_bilingual_segments.json           # 中日双语逐句
    - 05_summary.json                      # 结构化摘要
    - source/<video>.mp4                   # 源视频（含画面）
    - clips/plan.json + *_final.mp4        # 二次创作切片成片（可选）
