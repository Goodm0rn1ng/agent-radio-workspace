<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>回声工作台 · 入库看板</title>
<link rel="stylesheet" href="/static/theme.css">
<style>
  :root { --bg:var(--k-bg); --card:var(--k-surface); --line:var(--k-line); --fg:var(--k-ink);
          --mut:var(--k-mut); --ok:var(--k-ok); --warn:var(--k-warn); --bad:var(--k-bad); --acc:var(--k-acc); }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.55 var(--k-font); background:var(--bg); color:var(--fg);
         display:flex; flex-direction:column; height:100vh; }
  header { padding:14px 24px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:16px;
           background:var(--card); }
  header h1 { font-size:16px; margin:0; font-weight:650; }
  header .stats { color:var(--mut); font-size:13px; }
  main { flex:1; display:grid; grid-template-columns:300px 1fr; gap:0; min-height:0; }
  .side { border-right:1px solid var(--line); overflow:auto; padding:12px; background:var(--k-soft); }
  .side h2, .main h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--mut); margin:6px 4px 12px; }
  .ep { display:flex; align-items:center; justify-content:space-between; padding:7px 9px; border-radius:8px; }
  .ep:hover { background:var(--k-hover); }
  .ep .lbl { font-size:12px; color:var(--mut); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:185px; }
  .dot { width:8px; height:8px; border-radius:50%; flex:0 0 8px; }
  .dot.on { background:var(--ok); } .dot.off { background:var(--k-line-strong); }
  button { font:inherit; cursor:pointer; border:1px solid var(--k-line-strong); background:var(--card); color:var(--fg);
           border-radius:7px; padding:5px 11px; }
  button:hover { border-color:var(--acc); }
  button.mini { padding:3px 9px; font-size:12px; }
  .main { overflow:auto; padding:16px 24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--k-radius); padding:16px; margin-bottom:14px; }
  .card .ttl { font-weight:600; margin-bottom:4px; }
  .kind { font-size:11px; padding:2px 8px; border-radius:20px; margin-left:8px; }
  .kind.conflict { background:var(--k-sun-soft); color:var(--warn); }
  .kind.inspect { background:var(--k-acc-soft); color:var(--acc); }
  .cmp { display:grid; grid-template-columns:1fr 24px 1fr; gap:8px; align-items:center; margin:10px 0; }
  .box { border:1px solid var(--line); border-radius:8px; padding:9px 11px; background:var(--k-soft); }
  .box .h { font-size:11px; color:var(--mut); margin-bottom:3px; }
  .box.old .h { color:var(--mut); } .box.new .h { color:var(--ok); }
  .arrow { text-align:center; color:var(--mut); }
  .reason { color:var(--mut); font-size:12.5px; margin:6px 0 10px; }
  .acts { display:flex; gap:8px; flex-wrap:wrap; }
  .acts .seg { display:flex; gap:6px; }
  .empty { color:var(--mut); padding:40px; text-align:center; }
  .toast { position:fixed; right:18px; bottom:18px; background:var(--card); border:1px solid var(--k-line-strong);
           padding:10px 14px; border-radius:9px; opacity:0; transition:.25s; box-shadow:var(--k-shadow); }
  .toast.show { opacity:1; }
  code { color:var(--k-sun); background:var(--k-soft); padding:0 4px; border-radius:4px; }
</style>
</head>
<body>
<nav data-knav="dashboard"></nav>
<header>
  <h1>入库看板</h1>
  <span class="stats" id="stats">加载中…</span>
  <span style="flex:1"></span>
  <button class="mini" onclick="refresh()">刷新</button>
</header>
<main>
  <div class="side">
    <h2>期数</h2>
    <div id="episodes"></div>
  </div>
  <div class="main">
    <h2>待处理知识变更</h2>
    <div id="pending"></div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
async function jget(u){ return (await fetch(u)).json(); }
async function jpost(u,b){ const r=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}); if(!r.ok) throw new Error((await r.json()).detail||r.status); return r.json(); }

async function loadEpisodes(){
  const d = await jget("/api/episodes");
  $("#stats").textContent = `图谱实体 ${d.stats.entities} · 关系 ${d.stats.relations} · 已入库 ${d.ingested}/${d.total}（${d.collections.length} 个合集）`;
  $("#episodes").innerHTML = d.collections.map(col => {
    const rows = col.episodes.map(e => `
      <div class="ep" data-dir="${encodeURIComponent(e.dir)}">
        <span class="dot ${e.ingested?'on':'off'}"></span>
        <span class="lbl" title="${e.label}">${e.episode!=null?`#${e.episode} `:''}${e.label.replace(/^[0-9]{4}-[0-9]{2}-[0-9]{2}_/,'')}</span>
        <button class="mini" onclick='ingestDir(this)'>${e.ingested?'重入库':'入库'}</button>
      </div>`).join("");
    return `<details ${col.episodes.some(e=>!e.ingested)?'open':''}><summary style="cursor:pointer;padding:6px 4px;font-weight:600;font-size:12.5px">${col.name} <span style="color:var(--mut);font-weight:400">${col.episodes.filter(e=>e.ingested).length}/${col.episodes.length}</span></summary>${rows}</details>`;
  }).join("");
}

async function loadPending(){
  const d = await jget("/api/pending");
  const box = $("#pending");
  if(!d.pending.length){ box.innerHTML = `<div class="empty">暂无待处理项。入库时的疑点与冲突现已由 LLM 携上下文自动终审入库；此处仅显示历史遗留的挂起线程。</div>`; return; }
  box.innerHTML = d.pending.map(renderThread).join("");
}

function triple(t){ if(!t) return "—"; return `${t.subject?.name??t.subject} —[${t.relation??t.predicate}]→ ${t.object?.name??t.object}`; }

function renderThread(p){
  const isConf = p.kind === "conflicts";
  const items = p.items.map((it,i)=> isConf ? confItem(it,i) : inspItem(it,i)).join("");
  const opts = isConf
    ? `<option value="confirm">确认变更（保留历史线）</option><option value="overwrite">覆盖旧知识</option><option value="ignore">忽略新提取</option>`
    : `<option value="accept_correction">采用纠偏</option><option value="keep_original">保留原文</option><option value="ignore">忽略</option>`;
  return `<div class="card" data-thread="${encodeURIComponent(p.thread_id)}" data-kind="${p.kind}">
    <div class="ttl">${p.label || p.thread_id}
      <span class="kind ${isConf?'conflict':'inspect'}">${isConf?'知识冲突':'审核·高风险事实'}</span></div>
    ${items}
    <div style="margin-top:6px;color:var(--mut);font-size:12px">每项选择处理方式：</div>
    ${p.items.map((_,i)=>`<select class="dec" data-i="${i}" style="margin:6px 6px 0 0;padding:5px;border-radius:6px;background:var(--card);color:var(--fg);border:1px solid var(--line)">${opts}</select>`).join("")}
    <div class="acts" style="margin-top:12px"><button onclick='submitThread(this)'>提交本期决定并恢复</button></div>
  </div>`;
}

function confItem(it,i){
  return `<div class="cmp">
    <div class="box old"><div class="h">已有知识</div>${it.subject_name} —[${it.relation}]→ ${it.existing_object}</div>
    <div class="arrow">⟶</div>
    <div class="box new"><div class="h">新广播提取（第${it.new_source?.episode??'?'}期）</div>${it.subject_name} —[${it.relation}]→ ${it.new_object}</div>
  </div>`;
}

function inspItem(it,i){
  return `<div class="cmp">
    <div class="box old"><div class="h">原始抽取</div>${triple(it.original_triple)}</div>
    <div class="arrow">⟶</div>
    <div class="box new"><div class="h">建议纠偏（${it.suggested_type||''} · 置信 ${it.confidence??''}）</div>${triple(it.suggested_triple)}</div>
  </div>
  <div class="reason">理由：${it.reason||''}</div>`;
}

async function ingestDir(btn){
  const dir = decodeURIComponent(btn.closest(".ep").dataset.dir);
  btn.disabled = true; toast("入库中…（疑点与冲突将由 LLM 自动终审）");
  try{
    const r = await jpost("/api/ingest", {dir});
    toast(r.status==="interrupted" ? "已挂起（遗留审批流）" : `入库完成：${(r.written||[]).join(', ')}`);
    refresh();
  }catch(e){ toast("入库失败："+e.message); }
  finally{ btn.disabled = false; }
}

async function submitThread(btn){
  const card = btn.closest(".card");
  const thread_id = decodeURIComponent(card.dataset.thread);
  const decisions = [...card.querySelectorAll(".dec")].map(s=>s.value);
  toast("恢复状态机中…");
  try{
    const r = await jpost("/api/resume", {thread_id, decisions});
    toast(r.status==="interrupted" ? "已处理，仍有后续审批项" : `已恢复完成：${(r.written||[]).join(', ')}`);
    refresh();
  }catch(e){ toast("恢复失败："+e.message); }
}

function refresh(){ loadEpisodes(); loadPending(); }
refresh();
setInterval(loadPending, 5000);
</script>
<script src="/static/knav.js"></script>
</body>
</html>
