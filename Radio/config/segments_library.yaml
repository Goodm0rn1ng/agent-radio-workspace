version: 1
description: '广播节目常驻环节知识库。

  LLM 在做节目总结时会把这里的条目作为参考，匹配上的环节直接复用 `intro`，

  保证同一环节在不同期之间的描述一致。新环节由人工追加，避免噪音。

  '
programs:
- program_id: mygo_meigo_shukai
  program_ja: MyGO!!!!!の「迷子集会」
  program_zh: MyGO!!!!!的《迷子集会》
  note: MyGO!!!!! 五位声优的常规广播节目。
  recurring_segments:
  - id: bokuwatashi_maigochuu
    title_ja: 僕、私、迷子中
    aliases:
    - 僕私迷子中
    - ぼく わたし まいごちゅう
    - 僕、わたし、迷子中
    - ボク、ワタシ、迷子中
    intro: '这个环节征集听众们还在犹豫要不要做、迟迟无法迈出第一步、

      优柔寡断无法决定的事情的来信，由成员们一起为听众迷茫的事情

      出主意、做决断或鼓励，是节目主轴之一。

      '
  - id: auto_03b8cd
    title_ja: オープニング
    aliases: []
    intro: 节目固定的开场环节，主持人寒暄并介绍今天的话题。
  - id: 57577_035fc3
    title_ja: 迷子の57577
    aliases: []
    intro: 这个环节会听取听众迷茫的小故事，然后由当天的成员各自构思，用5字、7字、5字、7字、7字的词句，为听众编织一条信息。成员们不会事先沟通，直接现场即兴发表。
  - id: auto_d43a55
    title_ja: ふつおたのコーナー
    aliases: []
    intro: 这个环节会征集并介绍大家日常生活中发生的各种事情，包括趣事、留言、问题等。
  - id: auto_e2fb90
    title_ja: エンディング
    aliases: []
    intro: 节目固定的结尾环节，主持人总结本期节目，感谢听众，并进行各项告知。
  - id: auto_d52648
    title_ja: 僕たちはライブの感想をここで叫ぶ
    aliases: []
    intro: 这个环节专门征集并介绍听众们观看MyGO!!!!! Live后的感想，包括感受、想对成员说的话以及想问的问题。
  - id: auto_e8ccf4
    title_ja: 選曲
    aliases: []
    intro: 本环节播放一首MyGO!!!!!的歌曲，通常由一位成员推荐。
